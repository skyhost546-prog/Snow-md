<style>

:root{
--bg-color:#030305;
--card-bg:rgba(10,10,15,0.7);
--card-border:rgba(255,0,60,0.2);
--primary:#ff003c;
--primary-glow:rgba(255,0,60,0.5);
--error:#ff3b30;
--success:#00ff88;
--text-main:#ffffff;
--text-muted:#8b9bb4;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg-color);
font-family:'Outfit',sans-serif;
color:var(--text-main);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}

/* lumière ambiance */

.ambient-light{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(255,0,60,0.1)0%,rgba(0,0,0,0)70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:0;
pointer-events:none;
}

/* canvas */

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* card */

.interface-card{
position:relative;
z-index:10;
width:100%;
max-width:420px;
background:var(--card-bg);
backdrop-filter:blur(20px);
border:1px solid var(--card-border);
border-radius:28px;
padding:40px;
box-shadow:
0 25px 50px rgba(0,0,0,0.8),
0 0 20px rgba(255,0,60,0.1);
}

/* header */

.header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:30px;
}

/* logo robot */

.logo-container{
width:60px;
height:60px;
background:linear-gradient(145deg,#000,#1a1a1a);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid var(--primary);
box-shadow:
0 0 15px var(--primary-glow),
inset 0 0 10px rgba(255,0,60,0.2);
animation:floatLogo 3s ease-in-out infinite;
}

.logo-container i{
font-size:2rem;
color:var(--primary);
}

@keyframes floatLogo{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* titles */

.title-group h1{
font-size:1.6rem;
font-weight:700;
letter-spacing:-0.5px;
}

.title-group p{
font-size:0.85rem;
color:var(--primary);
font-weight:500;
text-transform:uppercase;
letter-spacing:1.5px;
}

/* status */

.system-status{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,0,60,0.05);
padding:12px 18px;
border-radius:12px;
margin-bottom:30px;
font-family:'JetBrains Mono',monospace;
font-size:0.75rem;
border:1px solid rgba(255,0,60,0.1);
}

.status-dot{
height:8px;
width:8px;
background:var(--primary);
border-radius:50%;
margin-right:6px;
display:inline-block;
box-shadow:0 0 10px var(--primary);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.2);opacity:0.5}
100%{transform:scale(1);opacity:1}
}

/* input */

.input-wrapper{
margin-bottom:25px;
}

input{
width:100%;
background:rgba(0,0,0,0.4);
border:1px solid var(--card-border);
border-radius:14px;
padding:18px 20px;
color:#fff;
font-family:'JetBrains Mono',monospace;
font-size:1.1rem;
outline:none;
text-align:center;
transition:0.3s;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 15px rgba(255,0,60,0.2);
}

/* button */

.action-btn{
width:100%;
padding:18px;
background:var(--primary);
border:none;
border-radius:14px;
color:#fff;
font-family:'Outfit',sans-serif;
font-weight:700;
font-size:1rem;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
text-transform:uppercase;
transition:0.3s;
}

.action-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px var(--primary-glow);
}

/* output */

.terminal-output{
margin-top:25px;
min-height:70px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.code-display{
font-family:'JetBrains Mono',monospace;
font-size:2.4rem;
font-weight:700;
color:var(--primary);
letter-spacing:5px;
cursor:pointer;
text-shadow:0 0 15px var(--primary-glow);
}

/* footer */

.footer{
margin-top:30px;
text-align:center;
font-size:0.7rem;
color:var(--text-muted);
letter-spacing:2px;
}

.footer b{
color:var(--primary);
}

/* toast */

#toast{
visibility:hidden;
background:#1a1a1a;
color:#fff;
padding:15px 25px;
border-radius:12px;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:100;
border:1px solid var(--primary);
}

#toast.show{
visibility:visible;
animation:slideUp .5s;
}

@keyframes slideUp{
from{bottom:0;opacity:0}
to{bottom:30px;opacity:1}
}

<body>

<div class="ambient-light"></div>
<canvas id="particles"></canvas>

<div class="interface-card">

<div class="header">

<div class="logo-container">
<i class="fa-solid fa-robot"></i>
</div>

<div class="title-group">
<h1>SNOW MD BOT PAIRING</h1>
<p>ADD NUMBER FOR PAIRING CODE</p>
</div>

</div>

<div class="system-status">
<div><span class="status-dot"></span>WEB SECURED</div>
<div style="color:var(--primary)">V1.0.0</div>
</div>

<div class="input-wrapper">
<input type="number" id="number" placeholder="Enter Phone Number">
</div>

<button class="action-btn" id="submit">
<span>Get Pairing Code</span>
<i class="fa-solid fa-paper-plane"></i>
</button>

<div class="terminal-output" id="output"></div>

<div class="footer">
POWERED BY <b>JON SNOW TECHX</b>
</div>

</div>

<div id="toast">Code copied</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>

<script>

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

class Particle{

constructor(){
this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height
this.size=1.5
this.speedX=(Math.random()-0.5)*0.8
this.speedY=(Math.random()-0.5)*0.8
}

update(){
this.x+=this.speedX
this.y+=this.speedY

if(this.x>canvas.width||this.x<0)this.speedX*=-1
if(this.y>canvas.height||this.y<0)this.speedY*=-1
}

draw(){
ctx.fillStyle="rgba(255,0,60,0.4)"
ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()
}

}

function init(){
for(let i=0;i<60;i++){
particles.push(new Particle())
}
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<particles.length;i++){

particles[i].update()
particles[i].draw()

for(let j=i;j<particles.length;j++){

let dx=particles[i].x-particles[j].x
let dy=particles[i].y-particles[j].y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<150){

ctx.strokeStyle=`rgba(255,0,60,${0.15-dist/1500})`
ctx.lineWidth=0.5

ctx.beginPath()
ctx.moveTo(particles[i].x,particles[i].y)
ctx.lineTo(particles[j].x,particles[j].y)
ctx.stroke()

}

}

}

requestAnimationFrame(animate)

}

init()
animate()

/* pairing */

const submit=document.getElementById("submit")
const output=document.getElementById("output")
const number=document.getElementById("number")

submit.addEventListener("click",async()=>{

const num=number.value.trim()

if(!num)return

output.innerHTML="<div style='color:#ff003c'>Loading...</div>"

try{

const res=await axios.get(`/code?number=${num}`)

if(res.data.code){

let code=res.data.code.match(/.{1,4}/g).join("-")

output.innerHTML=`
<div class="code-display" onclick="copyCode('${res.data.code}')">
${code}
</div>
<div style="font-size:12px;color:#8b9bb4">click to copy</div>
`

}

}catch{

output.innerHTML="<div style='color:red'>Connection error</div>"

}

})

function copyCode(code){

navigator.clipboard.writeText(code)

const toast=document.getElementById("toast")

toast.className="show"

setTimeout(()=>{
toast.className=""
},3000)

}

</script>
